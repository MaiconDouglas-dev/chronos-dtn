# Spring Boot App Settings
spring.application.name=chronos-dtn-gateway
server.port=8080

# Database Configuration (H2 in memory)
spring.datasource.url=jdbc:h2:mem:chronosdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Schema and Seed Data Initialization
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Hibernate / JPA configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security secret properties
chronos.security.jwt.secret=ChronosDtnSecretKeySpaceSecurityKey123!
chronos.security.jwt.issuer=chronos-dtn-gateway
